<nav class="navbar">
  <div class="nav-inner">

    <!-- Logo -->
    <a class="logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <path d="M6 10 L14 18 L6 26" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M30 10 L22 18 L30 26" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="logo-text">
        <span class="logo-name">C.Fohrer</span>
        <span class="logo-sub">developer</span>
      </div>
    </a>

    <!-- Desktop nav links -->
    <ul class="nav-links">
      @for (link of navLinks; track link) {
        <li><button (click)="scrollTo(link)">{{ link }}</button></li>
      }
    </ul>

    <!-- Language toggle + burger -->
    <div class="nav-right">
      <div class="lang-toggle">
        <button [class.active]="lang() === 'DE'" (click)="setLang('DE')">DE</button>
        <button [class.active]="lang() === 'EN'" (click)="setLang('EN')">EN</button>
      </div>
      <button class="burger" (click)="toggleMobile()" aria-label="Toggle menu">
        <span [class.open]="mobileOpen()"></span>
        <span [class.open]="mobileOpen()"></span>
        <span [class.open]="mobileOpen()"></span>
      </button>
    </div>

  </div>
</nav>

<!-- Mobile overlay -->
<div class="mobile-overlay" [class.visible]="mobileOpen()" (click)="closeMobile()">
  <div class="mobile-bubble" (click)="$event.stopPropagation()">
    <ul>
      @for (link of navLinks; track link) {
        <li><button (click)="scrollTo(link)">{{ link }}</button></li>
      }
      <li class="lang-row">
        <button [class.active]="lang() === 'DE'" (click)="setLang('DE')">DE</button>
        <button [class.active]="lang() === 'EN'" (click)="setLang('EN')">EN</button>
      </li>
    </ul>
  </div>
</div>
